name: Terraform

on:
  pull_request:
    branches: [ main ]
    paths: [ 'terraform/**' ]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: 'Terraform validation'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: terraform

    steps:
    - uses: actions/checkout@v4

    - uses: google-github-actions/auth@v3
      with:
        project_id: 'mrfood-490623'
        workload_identity_provider: 'projects/685340956759/locations/global/workloadIdentityPools/github/providers/mrfood-repo'
        service_account: 'github-actions@mrfood-490623.iam.gserviceaccount.com'

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -input=false
