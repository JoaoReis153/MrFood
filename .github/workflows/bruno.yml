name: Bruno API Tests

on:
  push:
    paths:
      - 'tests/mrfood-api/**'
      - '.github/workflows/bruno.yml'
      - 'Makefile'
      - 'services/**'
  pull_request:
    branches: [main]
    paths:
      - 'tests/mrfood-api/**'
      - '.github/workflows/bruno.yml'
      - 'Makefile'
      - 'services/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bruno-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bruno-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Create environment files
        run: |
          # 1. Create all .env files from templates
          make create_env
          
          # 2. Populate shared secrets (JWT)
          cat > services/.env <<'EOF'
          APP_JWT_ACCESS_TOKEN_SECRET=CY4dmpNgo4POxd2nkl/lJIPCqgeqzsM6If4l3Z/XOZE=
          APP_JWT_REFRESH_TOKEN_SECRET=test-refresh-secret-for-ci-0123456789
          EOF

          # 3. Populate per-service secrets (passwords)
          # These match the values used in previous CI runs and tests
          printf 'AUTH_POSTGRES_PASSWORD=mrfood_auth_secret\nAUTH_REDIS_PASS=\nKEYCLOAK_CLIENT_SECRET=mrfood-auth-client-secret\nKEYCLOAK_ADMIN_PASS=admin\n' > services/auth/.env
          echo "RESTAURANT_POSTGRES_PASSWORD=restaurantsecret" > services/restaurant/.env
          echo "BOOKING_POSTGRES_PASSWORD=bookingsecret" > services/booking/.env
          echo "REVIEW_POSTGRES_PASSWORD=reviewsecret" > services/review/.env
          echo "SPONSOR_POSTGRES_PASSWORD=sponsorsecret" > services/sponsor/.env
          echo "PAYMENT_POSTGRES_PASSWORD=paymentsecret" > services/payment/.env
          echo "CDC_RESTAURANT_PASSWORD=restaurantsecret" > services/cdc/.env
          
          # Notification secrets
          cat > services/notification/.env <<'EOF'
          SMTP_USER=mrfood.api@gmail.com
          SMTP_PASSWORD=wpbp rgwe hplj smzy
          SMTP_FROM=mrfood.api@gmail.com
          EOF

      - name: Go mod tidy (all services)
        run: |
          for dir in $(find services -name go.mod -exec dirname {} \;); do
            echo "Tidying $dir"
            cd "$dir"
            go mod tidy
            cd - > /dev/null
          done
        
      - name: Start services
        run: make build run

      - name: Wait for API gateway
        run: |
          ready=0
          for i in {1..90}; do
            status=$(curl -sS -o /tmp/gateway-auth-ping-body.txt -w "%{http_code}" http://localhost:8000/auth/ping/1 || true)

            if [ "$status" = "200" ]; then
              echo "Gateway and auth upstream are ready"
              ready=1
              break
            fi

            echo "Waiting for gateway/auth upstream... ($i/90) status=$status"

            if [ "$status" = "503" ]; then
              echo "Gateway is up but auth upstream is not ready yet"
            fi

            if [ $((i % 10)) -eq 0 ]; then
              echo "--- docker compose ps ---"
              docker compose -f services/docker-compose.yml --env-file services/config.env ps || true
              echo "--- auth logs (tail) ---"
              docker compose -f services/docker-compose.yml --env-file services/config.env logs --tail=80 auth || true
              echo "--- kong logs (tail) ---"
              docker compose -f services/docker-compose.yml --env-file services/config.env logs --tail=80 kong || true
            fi

            sleep 5
          done

          if [ "$ready" -ne 1 ]; then
            echo "Gateway/auth upstream did not become ready in time"
            echo "--- gateway ping response body ---"
            cat /tmp/gateway-auth-ping-body.txt || true
            echo "--- docker compose ps ---"
            make logs-dump
            exit 1
          fi

      - name: Bootstrap search (ES index + CDC connectors)
        run: make search-bootstrap

      - name: Run Bruno tests
        run: make test-bruno

      - name: Upload Bruno reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bruno-reports
          path: |
            tests/mrfood-api/reports/users-junit.xml
            tests/mrfood-api/reports/users-report.json
            tests/mrfood-api/reports/restaurants-junit.xml
            tests/mrfood-api/reports/restaurants-report.json
            tests/mrfood-api/reports/reservations-junit.xml
            tests/mrfood-api/reports/reservations-report.json
            tests/mrfood-api/reports/reviews-junit.xml
            tests/mrfood-api/reports/reviews-report.json
            tests/mrfood-api/reports/search-junit.xml
            tests/mrfood-api/reports/search-report.json
            tests/mrfood-api/reports/payment-junit.xml
            tests/mrfood-api/reports/payment-report.json
            tests/mrfood-api/reports/sponsor-junit.xml
            tests/mrfood-api/reports/sponsor-report.json
          if-no-files-found: warn

      - name: Dump service logs on failure
        if: failure()
        run: make logs-dump

      - name: Stop services
        if: always()
        run: make down-volumes
