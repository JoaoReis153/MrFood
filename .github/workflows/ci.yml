name: Lint & Test & Docker (Changed Only)

on:
  pull_request:
    branches: [main]
    paths: ['services/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ROOT_TEST_CMD: go test -v -race ./services/auth/... ./services/restaurant/... ./services/test_grpc/...

jobs:
  test-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: |
            services/auth/go.sum
            services/restaurant/go.sum
            services/test_grpc/go.sum

      - name: Test workspace
        run: ${{ env.ROOT_TEST_CMD }}

  detect-changed-services:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
      has-changes: ${{ steps.set-services.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-services
        run: |
          ALL_SERVICES=$(find ./services -maxdepth 1 -mindepth 1 -type d -exec test -f {}/go.mod \; -print | sed 's|./services/||')

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
            CHANGED=$(git diff --name-only $BASE_REF...HEAD 2>/dev/null | grep '^services/' || true | cut -d/ -f2 | sort -u | grep -w -f <(echo "$ALL_SERVICES"))
          else  # push/main or dispatch
            CHANGED="$ALL_SERVICES"  # All services
          fi

          if [ -z "$CHANGED" ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            SERVICES=$(echo "$CHANGED" | jq -Rc . | jq -cs .)
            echo "services=$SERVICES" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi

  lint-test:
    needs: [test-workspace, detect-changed-services]
    runs-on: ubuntu-latest
    if: needs.detect-changed-services.outputs.has-changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.services) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: |
            services/${{ matrix.service }}/go.sum
            services/${{ matrix.service }}/go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ./services/${{ matrix.service }}

      - name: Build & Test
        working-directory: ./services/${{ matrix.service }}
        run: |
          go build -v ./...
          go test -v -race ./...
