name: Lint & Test All Services
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-services:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
    steps:
      - uses: actions/checkout@v5
      - id: set-services
        run: |
          SERVICES=$(find ./services -maxdepth 1 -type d \( -name "auth*" -o -name "restaurant*" -o -name "*service*" \) -exec test -f {}/go.mod \; | sed 's|./services/||' | jq -R . | jq -s .)
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  lint-and-test:
    needs: detect-services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: |
            services/${{ matrix.service }}/go.sum
            services/${{ matrix.service }}/go.mod
      
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: ./services/${{ matrix.service }}
      
      - name: Build
        working-directory: ./services/${{ matrix.service }}
        run: go build -v ./...
      
      - name: Test
        working-directory: ./services/${{ matrix.service }}
        run: go test -v -race -coverprofile=coverage.out ./...