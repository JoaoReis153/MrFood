name: Lint & Test All Services
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-services:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
    steps:
      - uses: actions/checkout@v6
      - id: set-services
        run: |
          SERVICES=$(find ./services -maxdepth 1 -mindepth 1 -type d -exec test -f {}/go.mod \; -print | sed 's|./services/||' | jq -Rc . | jq -cs .)
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  lint-and-test-and-docker:
    needs: detect-services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: |
            services/${{ matrix.service }}/go.sum
            services/${{ matrix.service }}/go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ./services/${{ matrix.service }}

      - name: Build
        working-directory: ./services/${{ matrix.service }}
        run: go build -v ./...

      - name: Test
        working-directory: ./services/${{ matrix.service }}
        run: go test -v -race ./...

      - name: Build Docker image
        working-directory: ./services/${{ matrix.service }}
        run: docker build -t ${{ matrix.service }}:${{ github.sha }} .

      - name: Run Docker container
        run: |
          docker run -d \
            --name ${{ matrix.service }} \
            -p 8080:8080 \
            ${{ matrix.service }}:${{ github.sha }}

      - name: Health check
        run: curl --retry 5 --retry-delay 2 --fail http://localhost:8080/health

      - name: Stop and remove container
        if: always()
        run: |
          docker stop ${{ matrix.service }} || true
          docker rm ${{ matrix.service }} || true