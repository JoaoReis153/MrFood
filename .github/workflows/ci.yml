name: Lint & Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'  
          cache: true         
      
      - uses: golangci/golangci-lint-action@v4  
        with:
          version: v1.62.0
          working-directory: ./services/auth  

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      
      - name: Test
        working-directory: ./services/auth
        run: go test -v -race ./...
