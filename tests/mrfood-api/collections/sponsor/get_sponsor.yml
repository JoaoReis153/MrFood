info:
  name: Get sponsorship
  type: http
  seq: 4
  tags:
    - Sponsor

http:
  method: GET
  url: "{{baseUrl}}/sponsor/{{restaurantId}}"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("get sponsorship returns 200", () => {
          expect(res.status).to.equal(200);
        });

        if (res.status === 200) {
          test("response has id", () => {
            expect(res.body).to.have.property("id");
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
