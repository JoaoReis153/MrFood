examples:
  - name: 201 Response
    description: User successfully registered
    request:
      url: "{{baseUrl}}/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "John Doe",
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "user_12345",
            "name": "John Doe",
            "email": "john.doe@example.com"
          }
  - name: 400 Response
    description: Bad Request (e.g., missing fields, invalid email)
    request:
      url: "{{baseUrl}}/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "John Doe",
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 409 Response
    description: User already exists
    request:
      url: "{{baseUrl}}/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "John Doe",
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
