info:
  name: Add a review for a restaurant
  type: http
  seq: 1
  tags:
    - Reviews

http:
  method: POST
  url: "{{baseUrl}}/restaurants/:restaurantId/reviews"
  params:
    - name: restaurantId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "id": "rev_12345",
        "rating": 5,
        "comment": "Amazing food and great service!",
        "categories": "Food",
        "userId": "user_12345",
        "restaurantId": "12345",
        "createdAt": "2024-12-31T19:00:00Z"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Review created
    request:
      url: "{{baseUrl}}/restaurants/:restaurantId/reviews"
      method: POST
      params:
        - name: restaurantId
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "id": "rev_12345",
            "rating": 5,
            "comment": "Amazing food and great service!",
            "categories": "Food",
            "userId": "user_12345",
            "restaurantId": "12345",
            "createdAt": "2024-12-31T19:00:00Z"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
