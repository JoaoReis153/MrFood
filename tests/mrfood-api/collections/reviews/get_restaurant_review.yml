info:
  name: Get reviews of a restaurant
  type: http
  seq: 4
  tags:
    - Reviews

http:
  method: GET
  url: "{{baseUrl}}/reviews/{{restaurantId}}"
  params:
    - name: limit
      value: "10"
      type: query
    - name: page
      value: "1"
      type: query
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("get reviews returns 200", () => {
          expect(res.status).to.equal(200);
        });

        if (res.status === 200) {
          test("response has reviews array", () => {
            expect(res.body).to.have.property("reviews");
            expect(res.body.reviews).to.be.an("array");
          });

          test("at least one review exists", () => {
            expect(res.body.reviews.length).to.be.greaterThan(0);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
