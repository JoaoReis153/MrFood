info:
  name: Get reviews of a restaurant
  type: http
  seq: 1
  tags:
    - Reviews

http:
  method: GET
  url: "{{baseUrl}}/restaurants/:restaurantId/reviews"
  params:
    - name: restaurantId
      value: ""
      type: path
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: List of reviews
    request:
      url: "{{baseUrl}}/restaurants/:restaurantId/reviews"
      method: GET
      params:
        - name: restaurantId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "page": 1,
            "limit": 25,
            "data": [
              {
                "id": "rev_12345",
                "rating": 5,
                "comment": "Amazing food and great service!",
                "categories": "Food",
                "userId": "user_12345",
                "restaurantId": "12345",
                "createdAt": "2024-12-31T19:00:00Z"
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/restaurants/:restaurantId/reviews"
      method: GET
      params:
        - name: restaurantId
          value: ""
          type: path
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/restaurants/:restaurantId/reviews"
      method: GET
      params:
        - name: restaurantId
          value: ""
          type: path
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 404 Response
    description: Restaurant not found
    request:
      url: "{{baseUrl}}/restaurants/:restaurantId/reviews"
      method: GET
      params:
        - name: restaurantId
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 500 Response
    description: Server Error
    request:
      url: "{{baseUrl}}/restaurants/:restaurantId/reviews"
      method: GET
      params:
        - name: restaurantId
          value: ""
          type: path
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
