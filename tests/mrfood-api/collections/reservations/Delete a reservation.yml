info:
  name: Delete a reservation
  type: http
  seq: 4
  tags:
    - Reservations

http:
  method: DELETE
  url: http://localhost:8000/reservations/delete
  body:
    type: json
    data: |-
      {
        "booking_id": 4
      }
  auth:
    type: bearer
    token: placeTokenHere

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Reservation created
    request:
      url: "{{baseUrl}}/reservations"
      method: POST
      body:
        type: json
        data: |-
          {
            "id": "res_12345",
            "userId": "user_12345",
            "restaurantId": "12345",
            "dateTime": "2024-12-31T19:00:00Z",
            "numberOfPeople": 4
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
