info:
  name: Get available booking slots for a given hour
  type: http
  seq: 4
  tags:
    - Reservations

http:
  method: GET
  url: "{{baseUrl}}/reservations/minimum"
  params:
    - name: restaurant_id
      value: "{{restaurantId}}"
      type: query
    - name: time_start
      value: "2026-12-31T11:00:00Z"
      type: query
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("get working hours returns 200", () => {
          expect(res.status).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
