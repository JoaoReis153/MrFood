info:
  name: Get available booking slots for a given hour (GET)
  type: http
  seq: 1
  tags:
    - Reservations

http:
  method: GET
  url: "{{baseUrl}}/reservations/minimum"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: List of available Booking slots
    request:
      url: "{{baseUrl}}/reservations/minimum"
      method: GET
      params:
        - name: numberOfPeople
          value: ""
          type: query
          description: Number of people for the reservation
        - name: day
          value: ""
          type: query
          description: Day of the reservation (YYYY-MM-DD)
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "hour": ""
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/reservations/minimum"
      method: GET
      params:
        - name: numberOfPeople
          value: ""
          type: query
          description: Number of people for the reservation
        - name: day
          value: ""
          type: query
          description: Day of the reservation (YYYY-MM-DD)
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
