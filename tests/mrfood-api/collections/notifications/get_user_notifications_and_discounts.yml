info:
  name: Get user notifications and discounts
  type: http
  seq: 1
  tags:
    - Notifications

http:
  method: GET
  url: "{{baseUrl}}/notifications"
  params:
    - name: userId
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: List of notifications and discounts
    request:
      url: "{{baseUrl}}/notifications"
      method: GET
      params:
        - name: userId
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "notif_12345",
              "userId": "user_12345",
              "message": "Get 20% off at Doce Sobral!",
              "discount": 20
            }
          ]
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/notifications"
      method: GET
      params:
        - name: userId
          value: ""
          type: query
          disabled: true
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/notifications"
      method: GET
      params:
        - name: userId
          value: ""
          type: query
          disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 404 Response
    description: User not found
    request:
      url: "{{baseUrl}}/notifications"
      method: GET
      params:
        - name: userId
          value: ""
          type: query
          disabled: true
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 500 Response
    description: Server Error
    request:
      url: "{{baseUrl}}/notifications"
      method: GET
      params:
        - name: userId
          value: ""
          type: query
          disabled: true
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
