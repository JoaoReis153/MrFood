info:
  name: Login user
  type: http
  seq: 2
  tags:
    - Users

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "goncasmendonca42@gmail.com",
        "password": "StrongPassword123"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("login returns 200", () => {
          expect(res.status).to.equal(200);
        });

        if (res.status === 200) {
          test("response has access_token", () => {
            expect(res.body).to.have.property("access_token");
            expect(res.body.access_token).to.be.a("string").and.not.be.empty;
          });

          test("response has refresh_token", () => {
            expect(res.body).to.have.property("refresh_token");
            expect(res.body.refresh_token).to.be.a("string").and.not.be.empty;
          });

          bru.setEnvVar("token", res.body.access_token);
          bru.setEnvVar("refreshToken", res.body.refresh_token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful login
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "",
            "user": {
              "id": "user_12345",
              "name": "John Doe",
              "email": "john.doe@example.com"
            }
          }
  - name: 400 Response
    description: Bad Request (e.g., missing fields)
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 401 Response
    description: Invalid email or password
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
