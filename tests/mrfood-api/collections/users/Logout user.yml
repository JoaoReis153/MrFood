info:
  name: Logout user
  type: http
  seq: 3
  tags:
    - Users

http:
  method: POST
  url: "{{baseUrl}}/auth/logout"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: User logged out successfully
    request:
      url: "{{baseUrl}}/auth/logout"
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Logged out successfully"
          }
  - name: 401 Response
    description: Unauthorized (invalid or missing token)
    request:
      url: "{{baseUrl}}/auth/logout"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
