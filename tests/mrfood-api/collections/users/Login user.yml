info:
  name: Login user
  type: http
  seq: 2
  tags:
    - Users

http:
  method: POST
  url: http://localhost:8000/auth/login
  body:
    type: json
    data: |-
      {
        "email": "cristiano@example.com",
        "password": "StrongPassword123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful login
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "",
            "user": {
              "id": "user_12345",
              "name": "John Doe",
              "email": "john.doe@example.com"
            }
          }
  - name: 400 Response
    description: Bad Request (e.g., missing fields)
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 401 Response
    description: Invalid email or password
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
