  method: POST
  url: http://localhost:8000/auth/refresh
  body:
    type: json
    data: |-
      {
        "token" : "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJnZW5lcmF0ZS1rZXkiLCJzdWIiOiIxMCIsImV4cCI6MTc3NTAzNTAwNiwibmJmIjoxNzc1MDM0MTA2LCJpYXQiOjE3NzUwMzQxMDYsImp0aSI6IjRlZjAyYTJhLWYzY2ItNGJiYS04NWE4LThiZTViNDk5ZWRjNyIsInVzZXJfaWQiOiIxMCIsInVzZXJuYW1lIjoiZWR1IiwidG9rZW5fdmVyc2lvbiI6MSwidG9rZW5fdHlwZSI6ImFjY2VzcyJ9.Ey9KtnVPhWeKrZ7GGXJXm1xilg7qyIYBADBRhiftZGM"
