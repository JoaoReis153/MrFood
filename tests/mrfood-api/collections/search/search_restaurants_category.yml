info:
  name: Search restaurants by category
  type: http
  seq: 11
  tags:
    - Restaurants
    - Search

http:
  method: GET
  url: "{{baseUrl}}/restaurants/search?category=French&page=1&limit=5"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: token
      value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJnZW5lcmF0ZS1rZXkiLCJzdWIiOiIxIiwiZXhwIjoxNzc2NTU1ODAyLCJuYmYiOjE3NzY1NTQ5MDIsImlhdCI6MTc3NjU1NDkwMiwianRpIjoiMGU1MDI2MjUtN2FmOS00NWNkLWFhNGUtYzliOGE0ZjhhYTQ4IiwidXNlcl9pZCI6IjEiLCJ1c2VybmFtZSI6ImNyaXN0aWFubyIsInRva2VuX3ZlcnNpb24iOjEsInRva2VuX3R5cGUiOiJhY2Nlc3MifQ.-QZpNtlTer12SgvLxgBnQ3Hi7Tb5wzX7kwzpGB0PEvg

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Category-filtered restaurants returned
    request:
      url: "{{baseUrl}}/restaurants/search?category=French&page=1&limit=5"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": [
              {
                "id": 1,
                "name": "Le 147",
                "categories": ["French", "Dinner"]
              }
            ],
            "pagination": {
              "page": 1,
              "limit": 5,
              "total": 1,
              "pages": 1
            }
          }
  - name: 400 Response
    description: Invalid pagination values
    request:
      url: "{{baseUrl}}/restaurants/search?category=French&page=0&limit=0"
      method: GET
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
