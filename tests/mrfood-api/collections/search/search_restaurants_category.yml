info:
  name: Search restaurants by category
  type: http
  seq: 12
  tags:
    - Search

http:
  method: GET
  url: "{{baseUrl}}/search"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: category
      value: "Italian"
      type: query
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("search by category returns 200", () => {
          expect(res.status).to.equal(200);
        });

        if (res.status === 200) {
          test("response has data array", () => {
            expect(res.body).to.have.property("data");
            expect(res.body.data).to.be.an("array");
          });

          test("response has pagination", () => {
            expect(res.body).to.have.property("pagination");
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
