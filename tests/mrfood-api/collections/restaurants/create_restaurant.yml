info:
  name: Create restaurant
  type: http
  seq: 2
  tags:
    - Restaurants

http:
  method: POST
  url: "{{baseUrl}}/restaurants"
  body:
    type: json
    data: |-
      {
        "name": "demolicao-{{testRunId}}",
        "latitude": 56.64874557659272,
        "longitude": 40.059817033302636,
        "address": "charisma",
        "opening_time": "10:00:00",
        "closing_time": "12:00:00",
        "categories": [
          "civitas",
          "civitas1"
        ],
        "max_slots": 26,
        "has_media": true
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("create restaurant returns 200", () => {
          expect(res.status).to.equal(200);
        });

        if (res.status === 200) {
          test("response has restaurant_id", () => {
            expect(res.body).to.have.property("restaurant_id");
            expect(res.body.restaurant_id).to.be.a("number").and.be.greaterThan(0);
          });

          bru.setEnvVar("restaurantId", String(res.body.restaurant_id));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
