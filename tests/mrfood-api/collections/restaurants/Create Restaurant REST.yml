info:
  name: Create Restaurant REST
  type: http
  seq: 3
  tags:
    - Users

http:
  method: POST
  url: http://localhost:8000/restaurants
  body:
    type: json
    data: |-
      {
        "name": "demo3",
        "latitude": 56.64874557659272,
        "longitude": 40.059817033302636,
        "address": "charisma",
        "opening_time": "10:00:00",
        "closing_time": "12:00:00",
        "categories": [
          "civitas",
          "civitas1"
        ],
        "max_slots": 26,
        "has_media": true
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful login
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "",
            "user": {
              "id": "user_12345",
              "name": "John Doe",
              "email": "john.doe@example.com"
            }
          }
  - name: 400 Response
    description: Bad Request (e.g., missing fields)
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 401 Response
    description: Invalid email or password
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john@example.com",
            "password": "StrongPassword123"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
