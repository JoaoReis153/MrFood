info:
  name: Update restaurant
  type: http
  seq: 3
  tags:
    - Restaurants

http:
  method: PUT
  url: "{{baseUrl}}/restaurants/{{restaurantId}}"
  body:
    type: json
    data: |-
      {
        "name": "MrFood-{{testRunId}}",
        "latitude": 289.41019114077517,
        "longitude": 231.24068483866333,
        "address": "derelinquo",
        "opening_time": "10:00:00",
        "closing_time": "12:00:00",
        "categories": [
          "viscus",
          "viscus"
        ],
        "max_slots": 211
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("update restaurant returns 200", () => {
          expect(res.status).to.equal(200);
        });

        if (res.status === 200) {
          test("response has restaurant details", () => {
            expect(res.body).to.have.property("restaurant");
          });

          test("name was updated", () => {
            expect(res.body.restaurant.name).to.include("MrFood");
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
