examples:
  - name: 200 Response
    description: Restaurant details
    request:
      url: "{{baseUrl}}/restaurants/:restaurantId"
      method: GET
      params:
        - name: restaurantId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "12345",
            "name": "Doce Sobral",
            "tags": "Portuguese, Desserts",
            "price": "$$$",
            "phone": "+351 123 456 789",
            "rating": 4.5,
            "sponsored": false,
            "location": {
              "latitude": 40.7128,
              "longitude": -74.006,
              "address": "123 Sobral Street, Lisbon, Portugal"
            }
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/restaurants/:restaurantId"
      method: GET
      params:
        - name: restaurantId
          value: ""
          type: path
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 404 Response
    description: Restaurant not found
    request:
      url: "{{baseUrl}}/restaurants/:restaurantId"
      method: GET
      params:
        - name: restaurantId
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
  - name: 500 Response
    description: Server Error
    request:
      url: "{{baseUrl}}/restaurants/:restaurantId"
      method: GET
      params:
        - name: restaurantId
          value: ""
          type: path
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": "Error message"
          }
