info:
  name: Logout user (CI)
  type: http
  seq: 4
  tags:
    - ci
    - smoke

http:
  method: POST
  url: http://localhost:8000/auth/logout
  body:
    type: json
    data: |-
      {
        "token": "{{ci_access_token}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("logout returns expected status", function() {
          expect([200, 204, 401]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
