info:
  name: Login user (CI)
  type: http
  seq: 2
  tags:
    - ci
    - smoke

http:
  method: POST
  url: http://localhost:8000/auth/login
  body:
    type: json
    data: |-
      {
        "email": "ci_user_bruno@example.com",
        "password": "StrongPassword123"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("login returns 200", function() {
          expect(res.status).to.equal(200);
        });

        const token = res.body.token || res.body.access_token;

        test("login returns token", function() {
          expect(token).to.be.a("string").and.not.empty;
        });

        bru.setVar("ci_access_token", token);
        bru.setVar("ci_refresh_token", res.body.refresh_token || res.body.refreshToken);


settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
