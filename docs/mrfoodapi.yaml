openapi: 3.0.3
info:
  title: Restaurant Discovery & Reservation API
  description: API for searching restaurants, reviewing them, making reservations.
  version: 1.0.0

servers:
- url: http://localhost:8080/api

tags:
- name: Users
- name: Restaurants
- name: Search
- name: Reviews
- name: Reservations
- name: Payments
- name: Sponsorship

paths:
  /auth/register:
    post:
      tags:
      - Users
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - email
              - password
              properties:
                username:
                  type: string
                  example: john_doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: StrongPassword123
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
      - Users
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: StrongPassword123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags:
      - Users
      summary: User logout
      security:
      - bearerAuth: []
      responses:
        '200':
          description: User logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/refresh:
    post:
      tags:
      - Users
      summary: Refresh token
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Unauthorized (invalid or missing token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/ping/{id}:
    get:
      tags:
      - Users
      summary: Ping auth service
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Pong response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pong'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /restaurants:
    post:
      tags:
      - Restaurants
      summary: Create restaurant
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRestaurantRequest'
      responses:
        '201':
          description: Restaurant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRestaurantResponse'
        '400':
          description: Bad Request (e.g., missing fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized (invalid or missing token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /restaurants/compare:
    get:
      tags:
      - Restaurants
      summary: Compare two restaurants
      security:
      - bearerAuth: []
      description: Compare two restaurants
      parameters:
      - in: query
        name: restaurant_id_1
        required: true
        schema:
          type: integer
      - in: query
        name: restaurant_id_2
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareRestaurantDetailsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /restaurants/{id}:
    get:
      tags:
      - Restaurants
      security:
      - bearerAuth: []
      summary: Get restaurant details
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Restaurant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantDetails'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
      - Restaurants
      summary: Update restaurant
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRestaurantRequest'
      responses:
        '200':
          description: Restaurant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateRestaurantResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reviews/{restaurantId}:
    get:
      tags:
      - Reviews
      summary: Get reviews
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: restaurantId
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Reviews retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetReviewsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
      - Reviews
      summary: Create review
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: restaurantId
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReviewResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reviews/{reviewId}:
    put:
      tags:
      - Reviews
      summary: Update review
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: reviewId
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '200':
          description: Review updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateReviewResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Review or restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
      - Reviews
      security:
      - bearerAuth: []
      summary: Delete review
      parameters:
      - in: path
        name: reviewId
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: Review deleted
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Review or restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reservations:
    post:
      tags:
      - Reservations
      security:
      - bearerAuth: []
      summary: Create reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBookingResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reservations/{booking_id}:
    delete:
      tags:
      - Reservations
      security:
      - bearerAuth: []
      summary: Cancel reservation
      parameters:
      - in: path
        name: booking_id
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: Reservation cancelled
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /payment:
    get:
      tags:
      - Payments
      summary: Get payment receipts
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Payment details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetReceiptResponse'
        '400':
          description: Bad Request (e.g., invalid reservation ID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized (invalid or missing token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /payment/{receipt_id}:
    get:
      tags:
      - Payments
      summary: Get receipt
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: receipt_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Payment details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetReceiptResponse'
        '400':
          description: Bad Request (e.g., invalid receipt ID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized (invalid or missing token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sponsor/{id}:
    post:
      tags:
      - Sponsorship
      summary: Sponsor restaurant
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tier:
                  type: integer
                  minimum: 1
                  example: 1
      responses:
        '200':
          description: Sponsorship successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorshipResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized (invalid or missing token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags:
      - Sponsorship
      summary: Check sponsorship
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Sponsorship status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorshipResponse'
        '400':
          description: Bad Request (e.g., invalid restaurant ID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized (invalid or missing token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'   

  /search:
    get:
      tags:
      - Search
      summary: Search restaurants
      security:
      - bearerAuth: []
      description: Search for nearby restaurants or perform semantic search
      parameters:
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number
      - in: query
        name: limit
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
        description: Number of restaurants per page
      - in: query
        name: category
        schema:
          type: string
      - in: query
        name: name_suffix
        schema:
          type: string
      - in: query
        name: full_name
        schema:
          type: string
      - in: query
        name: latitude
        schema:
          type: number
      - in: query
        name: longitude
        schema:
          type: number
      - in: query
        name: radius_meters
        schema:
          type: number
      responses:
        '200':
          description: List of restaurants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchPaginatedResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        username:
          type: string
          example: "john_doe"

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          example: "jwt-access-token"
        refresh_token:
          type: string
          example: "jwt-refresh-token"
        user:
          $ref: '#/components/schemas/User'

    RefreshResponse:
      type: object
      properties:
        token:
          type: string
          example: "new-jwt-token"
        refresh_token:
          type: string
          example: "new-refresh-token"

    LogoutResponse:
      type: object
      properties: {}

    User:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 12345
        username:
          type: string
          example: "john_doe"

    Pong:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 1

    CreateRestaurantRequest:
      type: object
      properties:
        name:
          type: string
          example: "Doce Sobral"
        latitude:
          type: number
          example: 40.7128
        longitude:
          type: number
          example: -74.006
        address:
          type: string
          example: "123 Sobral Street, Lisbon, Portugal"
        opening_time:
          type: string
          example: "08:00"
        closing_time:
          type: string
          example: "22:00"
        categories:
          type: array
          items:
            type: string
        max_slots:
          type: integer
          example: 20
        has_media:
          type: boolean
          example: false

    CreateRestaurantResponse:
      type: object
      properties:
        restaurant_id:
          type: integer
          example: 12345
        presigned_url:
          type: string
          nullable: true
          example: "https://example.com/upload"

    UpdateRestaurantRequest:
      type: object
      properties:
        id:
          type: integer
          example: 12345
        name:
          type: string
          example: "Doce Sobral"
        latitude:
          type: number
          example: 40.7128
        longitude:
          type: number
          example: -74.006
        address:
          type: string
          example: "123 Sobral Street, Lisbon, Portugal"
        opening_time:
          type: string
          example: "08:00"
        closing_time:
          type: string
          example: "22:00"
        categories:
          type: array
          items:
            type: string
        max_slots:
          type: integer
          example: 20

    UpdateRestaurantResponse:
      type: object
      properties:
        restaurant:
          $ref: '#/components/schemas/RestaurantDetails'

    RestaurantDetails:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        name:
          type: string
          example: "Doce Sobral"
        latitude:
          type: number
          format: double
          example: 40.7128
        longitude:
          type: number
          format: double
          example: -74.006
        address:
          type: string
          example: "123 Sobral Street, Lisbon, Portugal"
        opening_time:
          type: string
          example: "08:00"
        closing_time:
          type: string
          example: "22:00"
        categories:
          type: array
          items:
            type: string
        media_url:
          type: string
          nullable: true
          example: "https://example.com/media.jpg"
        max_slots:
          type: integer
          format: int32
          example: 20
        owner_id:
          type: integer
          format: int64
          example: 1
        owner_name:
          type: string
          example: "John Doe"
        sponsor_tier:
          type: integer
          format: int32
          example: 0
        average_rating:
          type: number
          format: double
          example: 4.5
        review_count:
          type: integer
          format: int32
          example: 12

    CompareRestaurantDetailsResponse:
      type: object
      properties:
        restaurant1:
          $ref: '#/components/schemas/RestaurantDetails'
        restaurant2:
          $ref: '#/components/schemas/RestaurantDetails'

    RestaurantSearchResult:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        name:
          type: string
          example: "Doce Sobral"
        latitude:
          type: number
          format: double
          example: 40.7128
        longitude:
          type: number
          format: double
          example: -74.006
        address:
          type: string
          example: "123 Sobral Street, Lisbon, Portugal"
        categories:
          type: array
          items:
            type: string
        media_url:
          type: string
          nullable: true
          example: "https://example.com/media.jpg"

    Pagination:
      type: object
      properties:
        page:
          type: integer
          format: int32
          example: 1
        limit:
          type: integer
          format: int32
          example: 25
        total:
          type: integer
          format: int32
          example: 100
        pages:
          type: integer
          format: int32
          example: 4

    SearchPaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/RestaurantSearchResult'
        pagination:
          $ref: '#/components/schemas/Pagination'

    CreateBookingRequest:
      type: object
      properties:
        restaurant_id:
          type: integer
          example: 12345
        quantity:
          type: integer
          example: 4
        time_start:
          type: string
          format: date-time
          example: "2024-12-31T19:00:00Z"

    PaymentResponse:
      type: object
      properties:
        receipt_id:
          type: integer
          example: 98765

    CreateBookingResponse:
      type: object
      properties:
        booking_id:
          type: integer
          format: int32
          example: 12345
        payment:
          $ref: '#/components/schemas/PaymentResponse'

    GetReceiptResponse:
      type: object
      properties: {}

    SponsorshipResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        tier:
          type: integer
          format: int32
