syntax = "proto3";

package proto;

option go_package = "/pb;pb";
import "google/protobuf/timestamp.proto";

service SponsorService {
  rpc Sponsor (SponsorshipRequest) returns (SponsorshipResponse);
  rpc GetRestaurantSponsorship(GetRestaurantSponsorshipRequest) returns (SponsorshipResponse);
}

service RestaurantToSponsorService {
  rpc GetRestaurantSponsorship(GetRestaurantSponsorshipRequest) returns (GetRestaurantSponsorshipResponse);
}

service PaymentCommandService {
  rpc MakePayment (PaymentRequest) returns (PaymentResponse);
}

message PaymentRequest {
  int64 user_id = 1;
  float amount = 2;
  string user_email = 3;
  string idempotency_key = 4;
  string payment_description = 5;
  string type = 6;
}

message PaymentResponse {
  int32 receipt_id = 1;
}

//Important repeated = all data comes back in one response
//Important stream = data comes back in multiple responses, one at a time

message SponsorshipRequest {
  int64 id = 1;
  int32 tier = 2;
}

message SponsorshipResponse {
  int64 id = 1;
  int32 tier = 2;
  google.protobuf.Timestamp until = 3;
  int32 receipt_id = 4;
}

message GetRestaurantSponsorshipRequest {
  int64 id = 1;
}

message GetRestaurantSponsorshipResponse {
  int64 id = 1;
  repeated string categories = 2;
  int64 owner_id = 3;
}
