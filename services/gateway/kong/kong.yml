_format_version: "3.0"

services:
- name: auth
  host: auth
  port: 50051
  protocol: grpc

  routes:
  - name: auth
    protocols:
    - http
    - https
    paths:
    - /auth

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/auth.proto

- name: restaurant
  host: restaurant
  port: 50052
  protocol: grpc
  routes:
  - name: restaurant
    protocols:
    - http
    - https
    paths:
    - /restaurants

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/restaurant.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp

- name: booking
  host: booking
  port: 50053
  protocol: grpc
  routes:
  - name: booking
    protocols:
    - http
    - https
    paths:
    - /reservations

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/booking.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp

- name: review
  host: review
  port: 50055
  protocol: grpc
  routes:
  - name: review
    protocols:
    - http
    - https
    paths:
    - /reviews

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/review.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp

- name: sponsor
  host: sponsor
  port: 50054
  protocol: grpc
  routes:
  - name: sponsor
    protocols:
    - http
    - https
    paths:
    - /sponsor

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/sponsor.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp

consumers:
- username: my-client
  jwt_secrets:
  - key: generate-key
    secret: /m6LosSwzwgW9f2cGZBB0q257O9R4wPUepn4xp9vNAQ=
    algorithm: HS256
