_format_version: "3.0"

services:
  - name: auth
    host: auth
    port: 50051
    protocol: grpc

    routes:
      - name: auth
        protocols:
        - http
        - https
        paths:
          - /auth

    plugins:
      - name: grpc-gateway
        config:
          proto: /etc/kong/proto/auth.proto