_format_version: "3.0"

services:
- name: auth
  host: auth
  port: 50051
  protocol: grpc

  routes:
  - name: auth
    protocols:
    - http
    - https
    paths:
    - /auth

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/auth.proto

- name: restaurant
  host: restaurant
  port: 50052
  protocol: grpc
  routes:
  - name: restaurant
    protocols:
    - http
    - https
    paths:
    - /restaurants

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/restaurant.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp

- name: booking
