_format_version: "3.0"

plugins:
  - name: opentelemetry
    config:
      endpoint: http://otel-collector:4318/v1/traces
      sampling_rate: 1.0
      resource_attributes:
        service.name: kong-gateway
services:
- name: auth
  host: auth
  port: 50051
  protocol: grpc

  routes:
  - name: auth
    protocols:
    - http
    - https
    paths:
    - /auth
    strip_path: true

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/auth.proto

- name: restaurant
  host: restaurant
  port: 50052
  protocol: grpc
  routes:
  - name: restaurant
    protocols:
    - http
    - https
    paths:
    - /restaurants

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/restaurant.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp

- name: booking
  host: booking
  port: 50053
  protocol: grpc
  routes:
  - name: booking
    protocols:
    - http
    - https
    paths:
    - /reservations

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/booking.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp

- name: review
  host: review
  port: 50055
  protocol: grpc
  routes:
  - name: review
    protocols:
    - http
    - https
    paths:
    - /reviews

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/review.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp

- name: sponsor
  host: sponsor
  port: 50054
  protocol: grpc
  routes:
  - name: sponsor
    protocols:
    - http
    - https
    paths:
    - /sponsor

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/sponsor.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp

- name: payment
  host: payment
  port: 50057
  protocol: grpc
  routes:
  - name: payment
    protocols:
    - http
    - https
    paths:
    - /payment
    
  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/payment.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp
  
- name: search
  host: search
  port: 50056
  protocol: grpc
  routes:
  - name: search
    protocols:
    - http
    - https
    paths:
    - /search

  plugins:
  - name: grpc-gateway
    config:
      proto: /etc/kong/proto/search.proto
  - name: jwt
    config:
      claims_to_verify:
      - exp

consumers:
- username: keycloak
  jwt_secrets:
  # The `key` must match the `iss` claim in Keycloak-issued JWTs.
  # Keycloak sets iss = <KEYCLOAK_BASE_URL>/realms/<REALM>
  # Update this value if Keycloak is exposed on a different host.
  - key: "http://keycloak:8080/realms/mrfood"
    algorithm: RS256
    # Public key from the mrfood realm — matches the key embedded in
    # services/keycloak/realm-import.json (the mrfood-rsa-key component).
    rsa_public_key: |
      -----BEGIN PUBLIC KEY-----
      MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAwXPBBTEVkQN1Ky3c5iC/
      cOz1jVVwlfbEYyVuDuUS5/OV5Ck+opPG/MovzUsKXZI4sfofiPb4iopq5xlGFsHW
      /BVwgapSjGw0JX+WJarTuksVUpsKopXA+fKAxTi0N+JJDuylGdQXjyWB8CzUkZTi
      6u4PlGo/N7YVrNFk7H1U0eIAtemEqTQMTmJXnxk87OhfP6qlI4FYvodsbhp9Wfqt
      GTAqiNtM7W7pJfWQ/3yf+OpUlY1SrLuvQko7ik2/l3moWlfuyzoIhavFyAkvdMh9
      5mdkZeZnV4iicLlTfxurFDvgytOehtUwYEzuTH+rF9GSUJL09eRJWNL+utpA8Wbr
      6wIDAQAB
