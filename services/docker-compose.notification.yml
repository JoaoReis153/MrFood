x-common: &common
  restart: unless-stopped
  networks:
    - app-network

services:
  notification:
    build: ./notification/
    <<: *common
    env_file:
      - ./config.env
      - ./notification/.env   # SMTP_USER, SMTP_PASSWORD, SMTP_FROM
    depends_on:
      notification_redis:
        condition: service_healthy

  notification_redis:
    image: redis:7-alpine
    <<: *common
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5