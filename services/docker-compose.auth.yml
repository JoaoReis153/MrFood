x-common: &common
  restart: unless-stopped
  networks:
    - app-network

x-pg-healthcheck: &pg-healthcheck
  test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
  interval: 5s
  timeout: 5s
  retries: 5

services:
  auth:
    build: ./auth/
    <<: *common
    env_file:
      - ./config.env  # non-sensitive config (ports, DB names/hosts, addresses…)
      - .env          # shared secrets: APP_JWT_*
      - ./auth/.env   # auth secrets: AUTH_POSTGRES_PASSWORD, AUTH_REDIS_PASS
    depends_on:
      auth_db:
        condition: service_healthy
      auth_redis:
        condition: service_healthy

  auth_db:
    image: postgres:16
    <<: *common
    command: postgres -c ssl=off -c log_statement=ddl
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./auth/db_setup.sql:/docker-entrypoint-initdb.d/init.sql:Z
    env_file:
      - ./auth/.env   # POSTGRES_PASSWORD
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
    healthcheck:
      <<: *pg-healthcheck

  auth_redis:
    image: redis:7-alpine
    <<: *common
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  auth_db_data: