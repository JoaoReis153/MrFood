x-common: &common
  restart: unless-stopped
  networks:
    - app-network

x-pg-healthcheck: &pg-healthcheck
  test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
  interval: 5s
  timeout: 5s
  retries: 5

services:
  review:
    build: ./review/
    <<: *common
    env_file:
      - ./config.env
      - ./review/.env   # REVIEW_POSTGRES_PASSWORD
    environment:
      POSTGRES_HOST: review_db
    depends_on:
      review_db:
        condition: service_healthy

  review_db:
    image: postgres:16
    <<: *common
    command: postgres -c ssl=off -c log_statement=ddl
    volumes:
      - review_db_data:/var/lib/postgresql/data
      - ./review/db_setup.sql:/docker-entrypoint-initdb.d/init.sql:Z
    env_file:
      - ./review/.env   # POSTGRES_PASSWORD
    environment:
      POSTGRES_DB: ${REVIEW_POSTGRES_DB}
      POSTGRES_USER: ${REVIEW_POSTGRES_USER}
    healthcheck:
      <<: *pg-healthcheck

volumes:
  review_db_data: