x-common: &common
  restart: unless-stopped
  networks:
    - app-network
services:
  search:
    build: ./search/
    ports:
      - "${SEARCH_SERVER_PORT}:50051"
    <<: *common
    environment:
      APP_SERVER_PORT: 50051
      APP_LOG_LEVEL: debug
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-restaurants}
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME:-}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-}
      APP_JWT_ACCESS_TOKEN_SECRET: ${AUTH_JWT_ACCESS_TOKEN_SECRET}
      APP_JWT_REFRESH_TOKEN_SECRET: ${AUTH_JWT_REFRESH_TOKEN_SECRET}
    depends_on:
      elasticsearch:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

