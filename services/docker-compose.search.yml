x-common: &common
  restart: unless-stopped
  networks:
    - app-network

services:
  search:
    build: ./search/
    <<: *common
    ports:
      - "50056:50056"
    env_file:
      - ./config.env
      - .env            # shared secrets: APP_JWT_*
      - ./search/.env   # ELASTICSEARCH_USERNAME, ELASTICSEARCH_PASSWORD
    depends_on:
      elasticsearch:
        condition: service_healthy
