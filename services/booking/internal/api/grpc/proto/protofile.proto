syntax = "proto3";

import "google/protobuf/timestamp.proto";

package proto;

option go_package = "/pb;pb";

// sends the restaurant_id and desired booking starting timestamp
// on the restaurant service's server side, verify if timestamp corresponds to working hour:
//  - if not, return an error
//  - if so, return GetSlotsResponse
service RestaurantService {
  rpc GetSlots (GetSlotsRequest) returns (GetSlotsResponse);
}

service BookingService {
  rpc CreateBooking (CreateBookingRequest) returns (Booking);
}

message GetSlotsRequest {
  int32 restaurant_id = 1;
  google.protobuf.Timestamp time_start = 2;
}

message GetSlotsResponse {
  int32 restaurant_id = 1;
  int32 max_slots = 2;
  int32 current_slots = 3;
}

message CreateBookingRequest {
  int32 user_id = 1;
  int32 restaurant_id = 2;
  int32 quantity = 3;
  TimeRange booking_range = 4;
}

message Booking {
  int32 id = 1;
  int32 user_id = 2;
  int32 restaurant_id = 3;
  int32 quantity = 4;
  TimeRange booking_range = 5;
}

message TimeRange {
  google.protobuf.Timestamp time_start = 1;
  google.protobuf.Timestamp time_end = 2;
}