version: "3.8"

services:
  kong:
    image: '${GW_IMAGE:-kong/kong-gateway:3.13.0.2}'
    container_name: kong
    restart: on-failure
    networks:
      - kong-net

    environment:
      KONG_DATABASE: "off"                         # Disable database
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml  # Path to config file


      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001              # Admin API (optional in DB-less)

    volumes:
      - ./gateway/kong/kong.yml:/etc/kong/kong.yml:Z
      - ./gateway/kong/proto:/etc/kong/proto:Z

    ports:
      - "8000:8000"   # Proxy HTTP
      - "8443:8443"   # Proxy HTTPS
      - "8001:8001"   # Admin API (read-only in DB-less)

  auth:
    build: ./auth
    volumes:
      - ./auth:/app
    ports:
      - "50051:50051"
    environment:
      DB_HOST: auth_db
      DB_PORT: 5432
      DB_NAME: mrfood_auth
      DB_USER: auth
      DB_PASS: authsecret
    depends_on:
      auth_db:
        condition: service_healthy
    networks:
      - app-network
      - kong-net

  auth_db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mrfood_auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: authsecret
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./auth/db_setup.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d mrfood_auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

networks:
  kong-net:      # Custom bridge network for isolated Kong
    driver: bridge
  app-network:
    driver: bridge

volumes:
  auth_db_data: