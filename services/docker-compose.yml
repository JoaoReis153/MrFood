version: "3.8"

services:
  auth:
    build: ./auth
    volumes:
      - ./auth:/app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: auth_db
      DB_PORT: 5432
      DB_NAME: mrfood_auth
      DB_USER: auth
      DB_PASS: authsecret
      APP_JWT_SECRET: Z3Vlc3R3aG9zdHdvcmxkZm9yZXZlcmNoYW5nZXN3b3JkMTIzNDU2
    depends_on:
      auth_db:
        condition: service_healthy
    networks:
      - app-network

  auth_db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mrfood_auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: authsecret
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./auth/db_setup.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d mrfood_auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: postgres -c ssl=off -c log_statement=all
    networks:
      - app-network
  restaurant:
    build: ./restaurant
    volumes:
      - ./restaurant:/app
    ports:
      - "50051:50051"
    environment:
      DB_HOST: restaurant_db
      DB_PORT: 5432
      DB_NAME: mrfood_restaurant
      DB_USER: restaurant
      DB_PASS: restaurantsecret
    depends_on:
      restaurant_db:
        condition: service_healthy
    networks:
      - app-network

  restaurant_db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mrfood_restaurant
      POSTGRES_USER: restaurant
      POSTGRES_PASSWORD: restaurantsecret
    volumes:
      - restaurant_db_data:/var/lib/postgresql/data
      - ./restaurant/db_setup.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U restaurant -d mrfood_restaurant" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: postgres -c ssl=off -c log_statement=all
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  auth_db_data:
  restaurant_db_data: