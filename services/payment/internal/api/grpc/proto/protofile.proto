syntax = "proto3";

import "google/protobuf/timestamp.proto";

package proto;

option go_package = "/pb;pb";

service PaymentCommandService {
  rpc MakePayment (PaymentRequest) returns (PaymentResponse);
}

service PaymentQueryService {
  rpc GetReceiptById (ReceiptRequest) returns (GetReceiptResponse);
  rpc GetReceiptsByUser (ReceiptRequest) returns (GetReceiptResponse);
}

service PaymentToNotificationService {
  rpc SendReceipt (SendReceiptsRequest) returns (SendReceiptsResponse);
}

message PaymentRequest {
  float amount = 1;
  string idempotency_key = 2;
  string payment_description = 3;
  string type = 4;
}

message PaymentResponse {
  int32 receipt_id = 1;
}

message ReceiptRequest {
  optional int32 receipt_id = 1;
}

message GetReceiptResponse {}

message SendReceiptsRequest {
  repeated Receipt receipts = 1;
  string user_email = 2;
}

message SendReceiptsResponse {}

message Receipt {
  double amount = 1;
  string payment_description = 2;
  string current_payment_status = 3;
  string payment_type = 4;
  google.protobuf.Timestamp created_at = 5;
}