syntax = "proto3";

import "google/protobuf/timestamp.proto";

package proto;

option go_package = "/pb;pb";

service PaymentService {
  rpc MakePayment (PaymentRequest) returns (PaymentResponse);
  rpc GetReceipt (ReceiptRequest) returns (GetReceiptResponse);
}

// implement this in notification service
service PaymentToNotificationService {
  rpc SendReceipt (SendReceiptRequest) returns (SendReceiptResponse)
}

message PaymentRequest {
  double amount = 1;
  string idempotency_key = 2;
  string payment_description = 3;
  string type = 4;
}

message PaymentResponse {}

message ReceiptRequest {
  optional int32 receipt_id = 1;
  optional string type = 2;
  optional google.protobuf.Timestamp timestamp = 3;
}

message GetReceiptResponse {}

message SendReceiptRequest {
  repeated Receipt receipts = 1;
}

message SendReceiptResponse {}

message Receipt {
  int32 id = 1;
  int32 user_id = 2;
  double amount = 3;
  string user_email = 4;
  string idempotency_key = 5;
  string payment_description = 6;
  string current_payment_status = 7;
  string payment_type = 8;
  google.protobuf.Timestamp created_at = 9;
}