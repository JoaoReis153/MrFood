x-common: &common
  restart: unless-stopped
  networks:
    - app-network

x-pg-healthcheck: &pg-healthcheck
  test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
  interval: 5s
  timeout: 5s
  retries: 5

services:
  payment:
    build: ./payment/
    <<: *common
    env_file:
      - ./config.env
      - .env             # shared secrets: AUTH_JWT_*
      - ./payment/.env   # PAYMENT_POSTGRES_PASSWORD
    environment:
      POSTGRES_HOST: payment_db
      POSTGRES_DB: mrfood_payment
      POSTGRES_USER: payment
      APP_SERVER_PORT: 50057
      APP_JWT_ACCESS_TOKEN_SECRET: ${AUTH_JWT_ACCESS_TOKEN_SECRET}
      APP_JWT_REFRESH_TOKEN_SECRET: ${AUTH_JWT_REFRESH_TOKEN_SECRET}
    depends_on:
      payment_db:
        condition: service_healthy
    volumes:
      - ./payment:/app

  payment_db:
    image: postgres:16
    <<: *common
    command: postgres -c ssl=off -c log_statement=ddl
    volumes:
      - payment_db_data:/var/lib/postgresql/data
      - ./payment/db_setup.sql:/docker-entrypoint-initdb.d/init.sql:Z
    env_file:
      - ./payment/.env   # POSTGRES_PASSWORD
    environment:
      POSTGRES_DB: mrfood_payment
      POSTGRES_USER: payment
    healthcheck:
      <<: *pg-healthcheck

volumes:
  payment_db_data: