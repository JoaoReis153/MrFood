syntax = "proto3";

package proto;

option go_package = "/pb;pb";

import "google/protobuf/timestamp.proto";

// AuthToNotificationService defines the gRPC service for sending notifications related to user authentication.
service AuthToNotificationService {
  // SendRegistrationEmail sends a registration email to the specified username.
  rpc SendRegistrationEmail (SendRegistrationEmailRequest) returns (SendRegistrationEmailResponse);
}

// PaymentToNotificationService defines the gRPC service for sending notifications related to payments.
service PaymentToNotificationService {
  // SendReceipts sends a list of receipts to the appropriate recipients.
  rpc SendReceipts(SendReceiptsRequest) returns (SendReceiptsResponse);
}

message SendRegistrationEmailRequest {
  string email = 1;
  string username = 2;
}

message SendRegistrationEmailResponse {}


message SendReceiptsRequest {
  repeated Receipt receipts = 1;
  string user_email = 2;
}

message SendReceiptsResponse {}

message Receipt {
  double                    amount                 = 1;
  string                    payment_description    = 2;
  string                    current_payment_status = 3;
  string                    payment_type           = 4;
  google.protobuf.Timestamp created_at             = 5;
}