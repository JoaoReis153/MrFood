apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      containers:
      - name: {{ .Values.name }}
        image: {{ .Values.image }}
        ports:
        - containerPort: {{ .Values.port }}

        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}

        livenessProbe:
          grpc:
            port: {{ .Values.port }}
          initialDelaySeconds: 10

        readinessProbe:
          grpc:
            port: {{ .Values.port }}
          initialDelaySeconds: 5
        
        envFrom:
          - configMapRef:
              name: {{ .Values.name }}-config
          - secretRef:
              name: {{ .Values.name }}-secret

      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest
        args:
          - "--structured-logs"
          - "--port=5432"
          - "mrfood-490623:europe-southwest1:{{ .Values.cloudsql.instance }}"