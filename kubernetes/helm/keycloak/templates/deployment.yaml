apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      containers:
        - name: keycloak
          image: {{ .Values.image }}
          args:
            - start-dev
            - --import-realm
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.adminUser | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: {{ .Values.adminPassword | quote }}
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: JAVA_OPTS_APPEND
              value: "-Xms256m -Xmx512m"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
            - name: data
              mountPath: /opt/keycloak/data/h2
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm
        - name: data
          persistentVolumeClaim:
            claimName: keycloak-data
