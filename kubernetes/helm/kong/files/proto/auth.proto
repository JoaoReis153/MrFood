syntax = "proto3";

package proto;

option go_package = "/pb;pb";

import "google/api/annotations.proto";

service AuthService {
  
  rpc PingPong (Ping) returns (Pong) {
    option (google.api.http) = {
      get: "/auth/ping/{id}"
    };
  }

  rpc RegisterProcess (Register) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/auth/register"
      body: "*"
    };
  }

  rpc LoginProcess (Login) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/auth/login"
      body: "*"
    };
  }

  rpc RefreshTokenProcess (RefreshRequest) returns (RefreshResponse) {
    option (google.api.http) = {
      post: "/auth/refresh"
      body: "*"
    };
  };
  rpc LogoutProcess (LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/auth/logout"
      body: "*"
    };
  };

}

message Ping {
  int32 id = 1;
}

message Pong {
  int32 id = 1;
}

message Register {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  int64 id = 1;
  string username = 2;
}

message Login {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string token = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string token = 1;
}

message LogoutResponse {
}


message User {
  int32 id = 1;
  string username = 2;
}



