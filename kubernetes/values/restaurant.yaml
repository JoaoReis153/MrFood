name: restaurant
image: europe-southwest1-docker.pkg.dev/mrfood-490623/mrfood-repo/restaurant:v1.0.0
port: 50052

service:
  type: ClusterIP

env:
  secrets:
    POSTGRES_PASSWORD: restaurantsecret
  config:
    APP_SERVER_PORT: 50052
    RESTAURANT_DB_PORT: 5433
    POSTGRES_DB: mrfood_restaurant
    POSTGRES_USER: restaurant
    POSTGRES_HOST: 127.0.0.1
    APP_LOG_LEVEL: debug
    REVIEW_GRPC_ADDR: "review:50055"

cloudsql:
  instance: mrfood-restaurant-pg