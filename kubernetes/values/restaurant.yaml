name: restaurant
image: europe-southwest1-docker.pkg.dev/mrfood-490623/mrfood-repo/restaurant:c3008fbdcfaa460cd3d6feeba372e1b5a1bf55b6
port: 50052

resources:
  requests:
    cpu: "10m"
    memory: "32Mi"
  limits:
    cpu: "50m"
    memory: "64Mi"

autoscaling:
  minReplicas: 1
  maxReplicas: 3

service:
  type: ClusterIP

env:
  secrets:
    RESTAURANT_POSTGRES_PASSWORD: mrfood_restaurant_secret
  config:
    RESTAURANT_SERVER_PORT: 50052
    POSTGRES_PORT: 5432
    RESTAURANT_POSTGRES_DB: mrfood_restaurant
    RESTAURANT_POSTGRES_USER: mrfood_restaurant_user
    POSTGRES_HOST: 127.0.0.1
    POSTGRES_MIN_CONNS: 4
    POSTGRES_MAX_CONNS: 20
    POSTGRES_MAX_CONN_LIFETIME: 15m
    POSTGRES_HEALTH_CHECK_PERIOD: 1m
    APP_LOG_LEVEL: debug
    REVIEW_GRPC_ADDR: "review:80"

cloudsql:
  instance: mrfood-490623:europe-southwest1:mrfood-pg
