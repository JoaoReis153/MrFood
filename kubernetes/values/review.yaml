name: review
image: europe-southwest1-docker.pkg.dev/mrfood-490623/mrfood-repo/review:ff22f5b
port: 50055

resources:
  requests:
    cpu: "10m"
    memory: "32Mi"
  limits:
    cpu: "50m"
    memory: "64Mi"

autoscaling:
  minReplicas: 1
  maxReplicas: 3

service:
  type: ClusterIP

env:
  secrets:
    REVIEW_POSTGRES_PASSWORD: mrfood_review_secret
  config:
    REVIEW_SERVER_PORT: 50055
    POSTGRES_PORT: 5432
    REVIEW_POSTGRES_DB: mrfood_review
    REVIEW_POSTGRES_USER: mrfood_review_user
    POSTGRES_HOST: 127.0.0.1
    POSTGRES_MIN_CONNS: 4
    POSTGRES_MAX_CONNS: 20
    POSTGRES_MAX_CONN_LIFETIME: 15m
    POSTGRES_HEALTH_CHECK_PERIOD: 1m
    APP_LOG_LEVEL: debug
    REVIEW_TO_RESTAURANT_GRPC_ADDR: "restaurant:80"

cloudsql:
  instance: mrfood-490623:europe-southwest1:mrfood-pg
