name: sponsor
image: europe-southwest1-docker.pkg.dev/mrfood-490623/mrfood-repo/sponsor:v1.0.1
port: 50054

service:
  type: ClusterIP

env:
  secrets:
    SPONSOR_POSTGRES_PASSWORD: mrfood_sponsor_secret
  config:
    SPONSOR_SERVER_PORT: 50054
    POSTGRES_PORT: 5432
    SPONSOR_POSTGRES_DB: mrfood_sponsor
    SPONSOR_POSTGRES_USER: mrfood_sponsor_user
    POSTGRES_HOST: 127.0.0.1
    POSTGRES_MIN_CONNS: 4
    POSTGRES_MAX_CONNS: 20
    POSTGRES_MAX_CONN_LIFETIME: 15m
    POSTGRES_HEALTH_CHECK_PERIOD: 1m
    APP_LOG_LEVEL: debug
    RESTAURANT_GRPC_ADDR: "restaurant:80"
    PAYMENT_GRPC_ADDR: "payment:80"

cloudsql:
  instance: mrfood-490623:europe-southwest1:mrfood-sponsor-pg
