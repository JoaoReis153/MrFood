name: auth
image: europe-southwest1-docker.pkg.dev/mrfood-490623/mrfood-repo/auth:v1.0.1
port: 50051

service:
  type: ClusterIP

env:
  secrets:
    KEYCLOAK_CLIENT_SECRET: mrfood-auth-client-secret
    KEYCLOAK_ADMIN_PASS: admin
  config:
    AUTH_SERVER_PORT: 50051
    APP_LOG_LEVEL: debug
    KEYCLOAK_BASE_URL: "http://keycloak:8080"
    KEYCLOAK_REALM: mrfood
    KEYCLOAK_CLIENT_ID: mrfood-auth
    KEYCLOAK_ADMIN_USER: admin
    AUTH_TO_NOTIFICATION_GRPC_ADDR: "notification:80"

cloudsql:
  instance: mrfood-490623:europe-southwest1:mrfood-auth-pg
