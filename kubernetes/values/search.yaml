name: search
image: europe-southwest1-docker.pkg.dev/mrfood-490623/mrfood-repo/search:c3008fbdcfaa460cd3d6feeba372e1b5a1bf55b6
port: 50056

resources:
  requests:
    cpu: "25m"
    memory: "128Mi"
  limits:
    cpu: "100m"
    memory: "256Mi"

autoscaling:
  minReplicas: 1
  maxReplicas: 2

service:
  type: ClusterIP

env:
  secrets:
  config:
    SEARCH_SERVER_PORT: 50056
    ELASTICSEARCH_HOST: elasticsearch
    ELASTICSEARCH_PORT: 9200
    ELASTICSEARCH_INDEX: restaurants